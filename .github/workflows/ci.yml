name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: bash .github/scripts/install-linux-native.sh
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run test:locales
      - run: npm run build
